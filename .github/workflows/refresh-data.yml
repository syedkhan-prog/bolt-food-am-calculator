name: Refresh Data from Databricks

# Pulls provider stats + campaign history into data/*-calc.json and data/*-dash.json,
# then refreshes investment-data/. Runs every Monday; also trigger manually from Actions.

on:
  schedule:
    # Monday 06:00 UTC (~07:00 Malta winter / 08:00 summer)
    - cron: '0 6 * * 1'
  workflow_dispatch:
    inputs:
      countries:
        description: 'Optional country codes (comma-separated, e.g. mt,ro). Leave empty for all.'
        required: false
        default: ''

concurrency:
  group: refresh-databricks-data
  cancel-in-progress: false

jobs:
  refresh:
    runs-on: ubuntu-latest
    timeout-minutes: 180
    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Check Databricks token
        id: token
        env:
          DATABRICKS_TOKEN: ${{ secrets.DATABRICKS_TOKEN }}
        run: |
          if [ -z "${DATABRICKS_TOKEN:-}" ]; then
            echo "has_token=false" >> "$GITHUB_OUTPUT"
            echo "::warning::Missing repository secret DATABRICKS_TOKEN — Databricks steps will be skipped."
            echo "Add it under Settings → Secrets and variables → Actions (Databricks SQL warehouse PAT)."
            if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
              echo "::error::Manual run requires DATABRICKS_TOKEN."
              exit 1
            fi
          else
            echo "has_token=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Set up Python
        if: steps.token.outputs.has_token == 'true'
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        if: steps.token.outputs.has_token == 'true'
        run: pip install databricks-sql-connector pandas

      - name: Refresh calculator and AM dashboard JSON (data/)
        if: steps.token.outputs.has_token == 'true'
        env:
          DATABRICKS_TOKEN: ${{ secrets.DATABRICKS_TOKEN }}
        run: |
          ARGS=""
          if [ -n "${{ github.event.inputs.countries }}" ]; then
            ARGS=$(echo "${{ github.event.inputs.countries }}" | tr ',' ' ')
          fi
          python3 scripts/refresh_data.py $ARGS

      - name: Refresh budget envelopes (data/*-budget.json)
        if: steps.token.outputs.has_token == 'true'
        env:
          DATABRICKS_TOKEN: ${{ secrets.DATABRICKS_TOKEN }}
        run: |
          python3 scripts/build_ca_targets.py
          ARGS=""
          if [ -n "${{ github.event.inputs.countries }}" ]; then
            ARGS=$(echo "${{ github.event.inputs.countries }}" | tr ',' ' ')
          fi
          python3 scripts/refresh_budget_data.py $ARGS

      - name: Refresh investment dashboard CSVs
        if: steps.token.outputs.has_token == 'true'
        env:
          DATABRICKS_TOKEN: ${{ secrets.DATABRICKS_TOKEN }}
        run: python3 scripts/refresh_investment_data.py

      - name: Learn forecast corrections (snapshots vs actuals)
        run: |
          python3 scripts/build_cost_benchmarks.py
          python3 scripts/learn_from_snapshots.py

      - name: Commit and push updated data
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/ investment-data/
          if git diff --cached --quiet; then
            echo "No data changes to commit."
          else
            git commit -m "Auto-refresh data from Databricks ($(date -u +%Y-%m-%d) UTC)"
            git push
          fi
